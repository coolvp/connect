using System;
using System.Data;
using System.Windows.Forms;
using System.Data.SqlClient;

namespace connectform
{
    public partial class Form1 : Form
    {
        // Connection to SQL Server
        SqlConnection conn = new SqlConnection("Data Source=.\\SQLEXPRESS;Initial Catalog=studentdb;Integrated Security=True");

        public Form1()
        {
            InitializeComponent();
            this.StartPosition = FormStartPosition.CenterScreen; // center form
        }

        // Load data into DataGridView
        void LoadData()
        {
            try
            {
                SqlDataAdapter da = new SqlDataAdapter("SELECT * FROM stud", conn);
                DataTable dt = new DataTable();
                da.Fill(dt);
                dataGridView1.DataSource = dt;
            }
            catch (Exception ex)
            {
                MessageBox.Show(ex.Message);
            }
        }

        // Load data when form opens
        private void Form1_Load(object sender, EventArgs e)
        {
            LoadData();
        }

        // Insert record
        private void button1_Click(object sender, EventArgs e)
        {
            if (string.IsNullOrWhiteSpace(textBox1.Text) || string.IsNullOrWhiteSpace(textBox2.Text))
            {
                MessageBox.Show("Please enter Name and Age");
                return;
            }

            try
            {
                conn.Open();
                string query = "INSERT INTO stud (Name, Age) VALUES (@Name,@Age)";
                SqlCommand cmd = new SqlCommand(query, conn);
                cmd.Parameters.AddWithValue("@Name", textBox1.Text);
                cmd.Parameters.AddWithValue("@Age", textBox2.Text);
                cmd.ExecuteNonQuery();
                conn.Close();

                MessageBox.Show("Record Inserted");
                LoadData(); // Refresh DataGridView
            }
            catch (Exception ex)
            {
                MessageBox.Show(ex.Message);
                if (conn.State == ConnectionState.Open)
                    conn.Close();
            }
        }
    }
}
